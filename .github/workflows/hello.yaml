name: CI workflow

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v3

      - name: login to Dockerhub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build IMAGE
        run: docker build -t "${{ secrets.DOCKER_USERNAME }}"/ci-pratice:${{ github.run_number }} .

      - name: push to Dockerhub
        run: docker push "${{ secrets.DOCKER_USERNAME }}"/ci-pratice:${{ github.run_number }}


          
    
          
      
    
