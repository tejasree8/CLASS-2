name: CI Build and push

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v3

      - name: login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }} | docker login -u "${{ secrets.DOCKER_USERNAME }}  --password-stdin

      - name: Build Image 
        run: docker build -t "${{ secrets.DOCKER_USERNAME }}"/DEVOPS PRATICE:${{ github.run_number }} .

      - name: Push to DockerHub
        run: docker push  "${{ secrets.DOCKER_USERNAME }}"/DEVOPS PRATICE:${{ github.run_number }} 
      
